spring.application.name=url-shortner-sb

# Database Configuration
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
# ? Fix: Use environment variable for password ? never hardcode secrets!
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=${DATABASE_DIALECT}

# JWT Configuration
# ? Fix: Proper Base64 encoded secret (use environment variable in production)
jwt.secret=${JWT_SECRET}
# ? Fix: 86400000 = 24 hours (previously was 172800000 = 48hrs, fine but reduced for security)
jwt.expiration=86400000

# Logging ? only your package on DEBUG, rest on INFO
# ? Fix: Removed TRACE (too verbose), fixed wrong package name org.url -> com.url
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework=INFO
logging.level.com.url.shortner=DEBUG

frontend.url=${FRONTEND_URL}